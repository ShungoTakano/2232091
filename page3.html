<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページ3</title>
    <link rel="stylesheet" href="style.css">
  <style type="text/css">
    .bigbox {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      width: 500px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
    }

    #one, #two {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }

    #one {
      background-color: #b0c4de;
      width: 200px;
      flex: 1;
    }

    #two {
      background-color: #e6e6fa;
      width: 300px;
      flex: 1;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    p {
      text-align: center;
      padding: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>洋菓子専門店「ケーク」大阪 阿倍野 帝塚山</h1>
    <nav>
      <a href="index.html">トップに戻る</a>
    </nav>
    <p>
      ケーキハウス「ケーク」へようこそ<br>
      このサイトでは、人気のケーキを紹介します。<br>
      いらっしゃいませ<br>
      甘いものを食べると、脳のなかで｢幸せホルモン｣といわれる<br>
      セロトニンが増えていると考えられています。
    </p>
  </header>

  <main>
    <div class="bigbox">
      <div id="one">
        <img src="cake01.jpg" width="179" height="179" alt="ショートケーキ">
      </div>
      <div id="two">
        <p>
          <em>イチゴがのった一番人気のスポンジケーキです。大人から子供まで、年中愛されるケーキです。</em>
        </p>
      </div>
    </div>

    <div class="bigbox">
      <div id="one">
        <img src="cake02.jpg" width="179" height="179" alt="モンブラン">
      </div>
      <div id="two">
        <p>
          <em>栗をふんだんに使った、濃厚でリッチな味わいのケーキです。</em>
        </p>
      </div>
    </div>

    <div class="bigbox">
      <div id="one">
        <img src="cake03.jpg" width="179" height="179" alt="ザッハトルテ">
      </div>
      <div id="two">
        <p>
          <em>こってりとしたチョコレートの濃厚な味わい。</em>
        </p>
      </div>
    </div>

    <div class="bigbox">
      <div id="one">
        <img src="cake04.jpg" width="179" height="179" alt="シュークリーム">
      </div>
      <div id="two">
        <p>
          <em>サクサク生地と濃厚クリームの相性が抜群です。</em>
        </p>
